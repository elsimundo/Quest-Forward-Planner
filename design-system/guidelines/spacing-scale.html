<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-sans); background: #fff; padding: 24px; }
  .row { display: flex; align-items: flex-end; gap: 14px; }
  .step { text-align: center; }
  .bar { background: var(--quest-blue); border-radius: 2px; width: 100%; }
  .step span { display: block; font-size: 11px; color: var(--quest-body); margin-top: 8px; }
</style>
</head>
<body>
  <div class="row">
    <div class="step" style="width:28px;"><div class="bar" style="height:4px;"></div><span>4</span></div>
    <div class="step" style="width:28px;"><div class="bar" style="height:8px;"></div><span>8</span></div>
    <div class="step" style="width:28px;"><div class="bar" style="height:12px;"></div><span>12</span></div>
    <div class="step" style="width:28px;"><div class="bar" style="height:16px;"></div><span>16</span></div>
    <div class="step" style="width:36px;"><div class="bar" style="height:24px;"></div><span>24</span></div>
    <div class="step" style="width:40px;"><div class="bar" style="height:32px;"></div><span>32</span></div>
    <div class="step" style="width:48px;"><div class="bar" style="height:48px;"></div><span>48</span></div>
    <div class="step" style="width:56px;"><div class="bar" style="height:64px;"></div><span>64</span></div>
    <div class="step" style="width:72px;"><div class="bar" style="height:90px;"></div><span>96</span></div>
  </div>
</body>
</html>
