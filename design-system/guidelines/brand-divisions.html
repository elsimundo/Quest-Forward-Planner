<!-- @dsCard group="Brand" viewport="700x300" name="Division Lockups" subtitle="QUEST + division name in crimson with a line glyph" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-sans); background: #fff; padding: 24px; }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
  .cell { border: 1px solid var(--quest-border); border-radius: var(--radius-sm); height: 78px; display:flex; align-items:center; justify-content:center; padding: 12px; }
  .cell img { max-height: 44px; max-width: 100%; width: auto; }
</style>
</head>
<body>
  <div class="grid">
    <div class="cell"><img src="../assets/logos/divisions/hub.png" alt="Quest Hub" /></div>
    <div class="cell"><img src="../assets/logos/divisions/logistics.png" alt="Quest Logistics" /></div>
    <div class="cell"><img src="../assets/logos/divisions/engineering.png" alt="Quest Engineering" /></div>
    <div class="cell"><img src="../assets/logos/divisions/projects.png" alt="Quest Projects" /></div>
    <div class="cell"><img src="../assets/logos/divisions/meditech.png" alt="Quest Meditech" /></div>
    <div class="cell"><img src="../assets/logos/divisions/digital.png" alt="Quest Digital" /></div>
    <div class="cell"><img src="../assets/logos/divisions/power.png" alt="Quest Power" /></div>
    <div class="cell"><img src="../assets/logos/divisions/environments.png" alt="Quest Environments" /></div>
    <div class="cell"><img src="../assets/logos/divisions/workforce.png" alt="Quest Workforce" /></div>
  </div>
</body>
</html>
