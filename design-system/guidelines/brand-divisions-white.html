<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--quest-navy); padding: 24px; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px; align-items: center; }
  .cell { display:flex; align-items:center; justify-content:center; height: 50px; }
  .cell img { max-height: 40px; max-width: 100%; width: auto; }
</style>
</head>
<body>
  <div class="grid">
    <div class="cell"><img src="../assets/logos/divisions/hub-white.png" alt="Quest Hub" /></div>
    <div class="cell"><img src="../assets/logos/divisions/logistics-white.png" alt="Quest Logistics" /></div>
    <div class="cell"><img src="../assets/logos/divisions/meditech-white.png" alt="Quest Meditech" /></div>
    <div class="cell"><img src="../assets/logos/divisions/digital-white.png" alt="Quest Digital" /></div>
  </div>
</body>
</html>
