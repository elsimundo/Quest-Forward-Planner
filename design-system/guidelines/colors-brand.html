<!-- @dsCard group="Colors" viewport="700x150" name="Brand Blue" subtitle="Quest Blue — the core brand color" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-sans); background: #fff; }
  .row { display: flex; gap: 0; padding: 20px; }
  .sw { flex: 1; height: 110px; border-radius: var(--radius-sm); display: flex; flex-direction: column; justify-content: flex-end; padding: 12px; box-sizing: border-box; color: #fff; }
  .sw .name { font-size: 13px; font-weight: 700; }
  .sw .hex { font-size: 12px; opacity: 0.85; font-weight: 400; letter-spacing: 0.03em; }
  .row { gap: 12px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw" style="background: var(--quest-navy);"><span class="name">Quest Blue</span><span class="hex">#214b7f</span></div>
  </div>
</body>
</html>
