<!-- @dsCard group="Brand" viewport="700x150" name="UI Icons — Lucide" subtitle="lucide-react · 24px, ~2px stroke, currentColor" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-sans); background: #fff; padding: 26px 24px; color: var(--quest-navy); }
  .row { display: flex; gap: 30px; align-items: center; flex-wrap: wrap; }
  .i { text-align: center; color: var(--quest-navy); }
  .i svg { width: 26px; height: 26px; }
  .i span { display: block; font-size: 10px; color: var(--quest-body); margin-top: 8px; }
</style>
</head>
<body>
  <div class="row">
    <div class="i"><i data-lucide="menu"></i><span>menu</span></div>
    <div class="i"><i data-lucide="chevron-down"></i><span>chevron-down</span></div>
    <div class="i"><i data-lucide="x"></i><span>x</span></div>
    <div class="i"><i data-lucide="phone"></i><span>phone</span></div>
    <div class="i"><i data-lucide="mail"></i><span>mail</span></div>
    <div class="i"><i data-lucide="map-pin"></i><span>map-pin</span></div>
    <div class="i"><i data-lucide="arrow-right"></i><span>arrow-right</span></div>
    <div class="i"><i data-lucide="activity"></i><span>activity</span></div>
    <div class="i"><i data-lucide="truck"></i><span>truck</span></div>
    <div class="i"><i data-lucide="shield-check"></i><span>shield-check</span></div>
    <div class="i"><i data-lucide="wrench"></i><span>wrench</span></div>
    <div class="i"><i data-lucide="zap"></i><span>zap</span></div>
  </div>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script>lucide.createIcons();</script>
</body>
</html>
