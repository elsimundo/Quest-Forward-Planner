<!-- @dsCard group="Type" viewport="700x200" name="Headings" subtitle="Roboto Bold 700, dark, tight — h1 60 / h2 48 / h3 24" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-sans); background: #fff; padding: 22px 24px; color: var(--quest-heading); }
  .h1 { font-size: var(--fs-h1); font-weight: 700; line-height: 1.1; letter-spacing: 0; }
  .h2 { font-size: var(--fs-h2); font-weight: 700; line-height: 1.15; margin-top: 4px; }
  .h3 { font-size: var(--fs-h3); font-weight: 700; margin-top: 8px; }
  .tag { font-size: 11px; color: var(--quest-body); font-weight: 400; margin-left: 10px; }
</style>
</head>
<body>
  <div class="h1">Healthcare Solutions<span class="tag">h1 · 60 / 700</span></div>
  <div class="h2">Divisions That Keep Healthcare Moving<span class="tag">h2 · 48 / 700</span></div>
  <div class="h3">Pro-active Asset Management<span class="tag">h3 · 24 / 700</span></div>
</body>
</html>
