<!-- @dsCard group="Brand" viewport="700x180" name="Division Glyphs" subtitle="Line glyphs paired with each division's accent color" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-sans); background: #fff; padding: 22px 24px; }
  .row { display: flex; gap: 16px; }
  .g { flex: 1; text-align: center; }
  .icon { height: 64px; display: flex; align-items: center; justify-content: center; }
  .icon img { height: 38px; width: auto; }
  .sw { height: 8px; border-radius: 4px; margin: 12px 0 8px; }
  .name { font-size: 12px; font-weight: 700; color: var(--quest-heading); }
  .hex { display: block; font-size: 10px; color: var(--quest-body); font-weight: 400; letter-spacing: 0.02em; margin-top: 2px; }
</style>
</head>
<body>
  <div class="row">
    <div class="g"><div class="icon"><img src="../assets/icons/Hub.png" alt="Hub" /></div><div class="sw" style="background:var(--division-hub);"></div><span class="name">Hub</span><span class="hex">#b13a3a</span></div>
    <div class="g"><div class="icon"><img src="../assets/icons/Engineering.png" alt="Engineering" /></div><div class="sw" style="background:var(--division-engineering);"></div><span class="name">Engineering</span><span class="hex">#5a5a5a</span></div>
    <div class="g"><div class="icon"><img src="../assets/icons/Logistics.png" alt="Logistics" /></div><div class="sw" style="background:var(--division-logistics);"></div><span class="name">Logistics</span><span class="hex">#e0a826</span></div>
    <div class="g"><div class="icon"><img src="../assets/icons/Projects.png" alt="Projects" /></div><div class="sw" style="background:var(--division-projects);"></div><span class="name">Projects</span><span class="hex">#6a4c93</span></div>
    <div class="g"><div class="icon"><img src="../assets/icons/Meditech.png" alt="Meditech" /></div><div class="sw" style="background:var(--division-meditech);"></div><span class="name">Meditech</span><span class="hex">#f17f42</span></div>
    <div class="g"><div class="icon"><img src="../assets/icons/Digital.png" alt="Digital" /></div><div class="sw" style="background:var(--division-digital);"></div><span class="name">Digital</span><span class="hex">#2ab3c0</span></div>
    <div class="g"><div class="icon"><img src="../assets/icons/Power.png" alt="Power" /></div><div class="sw" style="background:var(--division-power);"></div><span class="name">Power</span><span class="hex">#3d7f53</span></div>
  </div>
</body>
</html>
