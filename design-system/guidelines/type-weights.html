<!-- @dsCard group="Type" viewport="700x130" name="Weights" subtitle="Light 300 · Regular 400 · Medium 500 · Bold 700" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-sans); background: #fff; padding: 24px; color: var(--quest-heading); }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 18px; }
  .w { font-size: 30px; }
  .w span { display: block; font-size: 11px; color: var(--quest-body); font-weight: 400; margin-top: 6px; }
</style>
</head>
<body>
  <div class="grid">
    <div class="w" style="font-weight:300;">Quest<span>Light · 300</span></div>
    <div class="w" style="font-weight:400;">Quest<span>Regular · 400</span></div>
    <div class="w" style="font-weight:500;">Quest<span>Medium · 500</span></div>
    <div class="w" style="font-weight:700;">Quest<span>Bold · 700</span></div>
  </div>
</body>
</html>
