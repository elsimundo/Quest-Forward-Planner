<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-sans); display: flex; }
  .panel { flex: 1; height: 180px; display: flex; align-items: center; justify-content: center; box-sizing: border-box; padding: 30px; }
  .light { background: #fff; border-right: 1px solid var(--quest-border); }
  .dark { background: var(--quest-navy); }
  img { height: 64px; width: auto; }
</style>
</head>
<body>
  <div class="panel light"><img src="../assets/logos/quest-primary.png" alt="Quest" /></div>
  <div class="panel dark"><img src="../assets/logos/quest-primary-white.png" alt="Quest" /></div>
</body>
</html>
