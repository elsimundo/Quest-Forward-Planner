<!-- @dsCard group="Colors" viewport="700x130" name="Division Accents" subtitle="One signature color per Quest division" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-sans); background: #fff; }
  .row { display: flex; gap: 10px; padding: 20px; }
  .sw { flex: 1; height: 90px; border-radius: var(--radius-sm); display: flex; flex-direction: column; justify-content: flex-end; padding: 10px; box-sizing: border-box; color: #fff; }
  .sw .name { font-size: 12px; font-weight: 700; }
  .sw .hex { font-size: 10px; opacity: 0.9; font-weight: 400; letter-spacing: 0.02em; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw" style="background:var(--division-hub);"><span class="name">Hub</span><span class="hex">#b13a3a</span></div>
    <div class="sw" style="background:var(--division-engineering);"><span class="name">Engineering</span><span class="hex">#5a5a5a</span></div>
    <div class="sw" style="background:var(--division-logistics);"><span class="name">Logistics</span><span class="hex">#e0a826</span></div>
    <div class="sw" style="background:var(--division-projects);"><span class="name">Projects</span><span class="hex">#6a4c93</span></div>
    <div class="sw" style="background:var(--division-meditech);"><span class="name">Meditech</span><span class="hex">#f17f42</span></div>
    <div class="sw" style="background:var(--division-digital);"><span class="name">Digital</span><span class="hex">#2ab3c0</span></div>
    <div class="sw" style="background:var(--division-power);"><span class="name">Power</span><span class="hex">#3d7f53</span></div>
  </div>
</body>
</html>
