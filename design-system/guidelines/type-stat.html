<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-sans); background: #fff; padding: 24px; }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 28px; }
  .num { font-size: 60px; font-weight: 900; color: var(--quest-navy); line-height: 1; }
  .cap { font-size: 15px; font-weight: 300; color: var(--quest-body); margin-top: 12px; line-height: 1.35; }
</style>
</head>
<body>
  <div class="grid">
    <div><div class="num">10,500</div><div class="cap">Logistical moves in the last year</div></div>
    <div><div class="num">99%</div><div class="cap">Uptime across engineering contracts</div></div>
    <div><div class="num">24/7</div><div class="cap">Coverage, year-round</div></div>
  </div>
</body>
</html>
